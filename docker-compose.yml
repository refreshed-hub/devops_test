version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - internal-network

  worker:
    build: ./worker
    container_name: worker
    networks:
      - internal-network
    volumes:
      - ./logs:/var/log/worker
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  app:
    build: ./app
    container_name: app
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - internal-network
    environment:
      - REDIS_HOST=redis

networks:
  internal-network:
    driver: bridge
